<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="40%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="50%" style="stop-color:#f472b6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="orbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="roundRect">
      <rect width="900" height="250" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" fill="url(#bg)"/>

  <!-- Subtle dot grid -->
  <g clip-path="url(#roundRect)" opacity="0.03">
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1" fill="white"/>
    </pattern>
    <rect width="900" height="250" fill="url(#dots)"/>
  </g>

  <!-- Decorative orbs -->
  <circle cx="80" cy="60" r="160" fill="url(#orbGrad)"/>
  <circle cx="820" cy="190" r="180" fill="url(#orbGrad)"/>

  <!-- Animated pulse rings -->
  <circle cx="450" cy="125" r="90" fill="none" stroke="#ec4899" stroke-width="0.5" opacity="0.06">
    <animate attributeName="r" values="90;130;90" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.06;0.02;0.06" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="125" r="60" fill="none" stroke="#ec4899" stroke-width="0.5" opacity="0.04">
    <animate attributeName="r" values="60;100;60" dur="6s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.04;0.01;0.04" dur="6s" repeatCount="indefinite" begin="1s"/>
  </circle>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="2" rx="1" fill="url(#accent)" opacity="0.9"/>

  <!-- Organization name -->
  <text x="450" y="112" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="800" letter-spacing="-0.5">
    <tspan fill="white">SoClose</tspan>
    <tspan fill="#f472b6"> Society</tspan>
  </text>

  <!-- Tagline -->
  <text x="450" y="140" text-anchor="middle" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" letter-spacing="0.5">Digital Innovation Through Automation &amp; AI</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">
    <rect x="152" y="168" width="100" height="26" rx="13" fill="#ec4899" opacity="0.08"/>
    <rect x="152" y="168" width="100" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.25"/>
    <text x="202" y="185" text-anchor="middle" fill="#f472b6">Open Source</text>

    <rect x="264" y="168" width="80" height="26" rx="13" fill="#ec4899" opacity="0.08"/>
    <rect x="264" y="168" width="80" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.25"/>
    <text x="304" y="185" text-anchor="middle" fill="#f472b6">Python</text>

    <rect x="356" y="168" width="90" height="26" rx="13" fill="#ec4899" opacity="0.08"/>
    <rect x="356" y="168" width="90" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.25"/>
    <text x="401" y="185" text-anchor="middle" fill="#f472b6">AI Agents</text>

    <rect x="458" y="168" width="100" height="26" rx="13" fill="#ec4899" opacity="0.08"/>
    <rect x="458" y="168" width="100" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.25"/>
    <text x="508" y="185" text-anchor="middle" fill="#f472b6">Automation</text>

    <rect x="570" y="168" width="100" height="26" rx="13" fill="#ec4899" opacity="0.08"/>
    <rect x="570" y="168" width="100" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.25"/>
    <text x="620" y="185" text-anchor="middle" fill="#f472b6">Blockchain</text>

    <rect x="682" y="168" width="80" height="26" rx="13" fill="#ec4899" opacity="0.12"/>
    <rect x="682" y="168" width="80" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="0.8" opacity="0.35"/>
    <text x="722" y="185" text-anchor="middle" fill="#ec4899" font-weight="600">17+ Tools</text>
  </g>

  <!-- Left decorative line -->
  <line x1="60" y1="105" x2="160" y2="105" stroke="#ec4899" stroke-width="0.5" opacity="0.15"/>
  <circle cx="60" cy="105" r="2" fill="#ec4899" opacity="0.3"/>

  <!-- Right decorative line -->
  <line x1="740" y1="105" x2="840" y2="105" stroke="#ec4899" stroke-width="0.5" opacity="0.15"/>
  <circle cx="840" cy="105" r="2" fill="#ec4899" opacity="0.3"/>

  <!-- Bottom line -->
  <line x1="200" y1="212" x2="700" y2="212" stroke="#ec4899" stroke-width="0.3" opacity="0.1"/>

  <!-- Subtitle bottom -->
  <text x="450" y="232" text-anchor="middle" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="10" letter-spacing="3" font-weight="400">FREE TOOLS FOR THE COMMUNITY</text>

  <!-- Bottom accent line -->
  <rect x="0" y="248" width="900" height="2" rx="1" fill="url(#accent)" opacity="0.9"/>
</svg>
