<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 250" width="900" height="250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b1b1b"/>
      <stop offset="100%" style="stop-color:#2a2a3d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="250" rx="16" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="120" fill="#575ECF" opacity="0.04"/>
  <circle cx="850" cy="200" r="150" fill="#575ECF" opacity="0.04"/>
  <circle cx="450" cy="125" r="200" fill="#575ECF" opacity="0.02"/>

  <!-- Logo mark - interlocking circles representing connection -->
  <circle cx="410" cy="75" r="22" stroke="#575ECF" stroke-width="2.5" fill="none" opacity="0.8"/>
  <circle cx="445" cy="75" r="22" stroke="#7B80E0" stroke-width="2.5" fill="none" opacity="0.8"/>
  <circle cx="480" cy="75" r="22" stroke="#575ECF" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- Organization name -->
  <text x="450" y="140" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" letter-spacing="1">SoClose Society</text>

  <!-- Tagline -->
  <text x="450" y="170" text-anchor="middle" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="400">Digital Innovation Through Automation &amp; AI</text>

  <!-- Feature pills -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500">
    <rect x="195" y="192" width="95" height="24" rx="12" fill="#575ECF" opacity="0.15"/>
    <text x="242" y="208" text-anchor="middle" fill="#575ECF">Open Source</text>

    <rect x="305" y="192" width="75" height="24" rx="12" fill="#575ECF" opacity="0.15"/>
    <text x="342" y="208" text-anchor="middle" fill="#575ECF">Python</text>

    <rect x="395" y="192" width="95" height="24" rx="12" fill="#575ECF" opacity="0.15"/>
    <text x="442" y="208" text-anchor="middle" fill="#575ECF">Automation</text>

    <rect x="505" y="192" width="85" height="24" rx="12" fill="#575ECF" opacity="0.15"/>
    <text x="547" y="208" text-anchor="middle" fill="#575ECF">Selenium</text>

    <rect x="605" y="192" width="100" height="24" rx="12" fill="#575ECF" opacity="0.15"/>
    <text x="655" y="208" text-anchor="middle" fill="#575ECF">11 Free Tools</text>
  </g>
</svg>
