<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 56" width="250" height="56" role="img" aria-label="Follow SoClose Society on GitHub">
  <defs>
    <linearGradient id="sheenF" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="btnClipF">
      <rect x="3" y="3" width="244" height="50" rx="25"/>
    </clipPath>
  </defs>

  <!-- Pulsing halo -->
  <rect x="3" y="3" width="244" height="50" rx="25" fill="none" stroke="#ec4899" stroke-width="2" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.08;0.35" dur="2.2s" begin="0.7s" repeatCount="indefinite"/>
  </rect>

  <!-- Button body -->
  <rect x="3" y="3" width="244" height="50" rx="25" fill="#0D0D0D"/>
  <rect x="3" y="3" width="244" height="50" rx="25" fill="#ec4899" opacity="0.08"/>
  <rect x="3" y="3" width="244" height="50" rx="25" fill="none" stroke="#ec4899" stroke-width="1.2" opacity="0.6"/>

  <!-- Moving sheen -->
  <g clip-path="url(#btnClipF)">
    <rect x="-90" y="3" width="90" height="50" fill="url(#sheenF)" transform="skewX(-15)">
      <animate attributeName="x" values="-90;280" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Person+ icon -->
  <g transform="translate(42,28)" fill="none" stroke="#f472b6" stroke-width="2" stroke-linecap="round">
    <circle cx="-2" cy="-5" r="4.5"/>
    <path d="M-10,10 C-10,1.5 6,1.5 6,10"/>
    <line x1="8" y1="-4" x2="14" y2="-4"/>
    <line x1="11" y1="-7" x2="11" y2="-1"/>
  </g>

  <text x="142" y="34" text-anchor="middle" fill="#f472b6" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" letter-spacing="0.3">Follow the org</text>
</svg>
